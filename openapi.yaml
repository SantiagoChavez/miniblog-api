openapi: 3.1.0
info:
  title: Henry M2 - API Miniblog
  version: 1.0.0
  description: API REST para gestión de autores y posts. Proyecto Integrador M2.
  contact:
    name: Santiago Ezequiel Chavez
    email: santiago@example.com # Cambialo por el tuyo
servers:
  - url: http://localhost:3000
    description: Servidor de desarrollo local
  - url: https://miniblog-api-production-5fba.up.railway.app
    description: Servidor de producción en Railway

paths:
  /api/authors:
    get:
      summary: Obtener todos los autores
      responses:
        "200":
          description: Lista de autores devuelta con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
    post:
      summary: Crear un nuevo autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAuthor'
      responses:
        "201":
          description: Autor creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        "400":
          description: Datos inválidos o email duplicado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/authors/{id}:
    get:
      summary: Obtener autor por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autor encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        "404":
          description: Autor no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Actualizar autor por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAuthor'
      responses:
        "200":
          description: Autor actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        "400":
          description: Datos inválidos o email duplicado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "404":
          description: Autor no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar autor por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Autor eliminado correctamente.
        "404":
          description: Autor no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/posts:
    get:
      summary: Obtener todos los posts
      responses:
        "200":
          description: Lista de posts devuelta con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Crear un nuevo post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPost'
      responses:
        "201":
          description: Post creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        "400":
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "500":
          description: Error interno al crear post (por ejemplo, author_id inválido).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/posts/{id}:
    get:
      summary: Obtener post por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        "404":
          description: Post no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Actualizar post por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
                published:
                  type: boolean
      responses:
        "200":
          description: Post actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        "400":
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "404":
          description: Post no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar post por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Post eliminado correctamente.
        "404":
          description: Post no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/posts/author/{authorId}:
    get:
      summary: Obtener posts de un autor específico
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de posts del autor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 150
        bio:
          type: string
          maxLength: 1000
    NewAuthor:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 150
        bio:
          type: string
          maxLength: 1000
    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
          maxLength: 255
        content:
          type: string
          maxLength: 5000
        author_id:
          type: integer
        published:
          type: boolean
    NewPost:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          maxLength: 255
        content:
          type: string
          maxLength: 5000
        author_id:
          type: integer
        published:
          type: boolean
          default: false
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    ValidationError:
      type: object
      properties:
        error:
          type: string
        errors:
          type: array
          items:
            type: string
      example:
        error: "Validation failed"
        errors:
          - "name is required"
          - "email must be a valid email"
